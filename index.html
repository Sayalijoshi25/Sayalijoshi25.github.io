<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portfolio highlighting experience in cloud platforms, Linux systems, distributed databases, automation, and LLM-based AI systems." />
  <title>Sayali Joshi | Cloud & AI Engineer</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121a31;
      --card-2: #182344;
      --text: #eef2ff;
      --muted: #b7c2e1;
      --accent: #7c9cff;
      --accent-2: #9f7aea;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 20px 50px rgba(0,0,0,0.28);
      --max: 1080px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124, 156, 255, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(159, 122, 234, 0.16), transparent 24%),
        linear-gradient(180deg, #09101d 0%, #0b1020 100%);
      color: var(--text);
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
      background: rgba(9, 16, 29, 0.78);
      border-bottom: 1px solid var(--border);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
    }

    .brand {
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .nav-links a:hover,
    .social a:hover,
    .project-links a:hover,
    .cta-row a:hover {
      color: white;
    }

    .hero {
      padding: 76px 0 48px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.35fr 0.9fr;
      gap: 28px;
      align-items: center;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(2.3rem, 5vw, 4.6rem);
      line-height: 1.08;
      margin: 0 0 14px;
      letter-spacing: -1.4px;
    }

    .lead {
      font-size: 1.08rem;
      color: var(--muted);
      max-width: 60ch;
      margin-bottom: 22px;
    }

    .cta-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 14px;
      font-weight: 600;
      border: 1px solid transparent;
      transition: 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      box-shadow: var(--shadow);
    }

    .btn-secondary {
      border-color: var(--border);
      color: var(--text);
      background: rgba(255,255,255,0.03);
    }

    .hero-card,
    .section-card,
    .project-card,
    .contact-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 24px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .stat {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
    }

    .stat h3 {
      margin: 0 0 6px;
      font-size: 1.5rem;
    }

    .stat p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    section {
      padding: 18px 0 10px;
    }

    .section-title {
      font-size: 1.75rem;
      margin: 0 0 8px;
    }

    .section-subtitle {
      color: var(--muted);
      margin: 0 0 20px;
    }

    .about-grid,
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    .section-card {
      padding: 24px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }
